<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceso — Panel Admin UMAE</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-100 flex items-center justify-center p-4">

  <div class="w-full max-w-sm">

    <!-- Alerta de error (visible si URL contiene ?error=1) -->
    <div id="error-banner" class="hidden mb-4 rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
      Contraseña incorrecta. Intente de nuevo.
    </div>

    <div class="overflow-hidden rounded-xl shadow-lg">

      <!-- Encabezado -->
      <div class="bg-[#006847] px-6 py-6 text-center">
        <p class="text-3xl font-bold text-white tracking-wide">IMSS</p>
        <p class="mt-1 text-sm text-white/80">
          UMAE Hospital de Especialidades · Panel de Administración
        </p>
      </div>

      <!-- Formulario -->
      <div class="bg-white px-6 py-7">
        <form method="POST" action="/admin/login">
          <div class="mb-5">
            <label for="password" class="mb-1.5 block text-sm font-medium text-gray-700">
              Contraseña
            </label>
            <input
              id="password"
              type="password"
              name="password"
              required
              autofocus
              class="w-full rounded-lg border border-gray-300 px-3 py-2.5 text-sm focus:border-transparent focus:outline-none focus:ring-2 focus:ring-[#006847]"
            />
          </div>
          <button
            type="submit"
            class="w-full rounded-lg bg-[#006847] py-2.5 text-sm font-semibold text-white transition-colors hover:bg-[#004d34]"
          >
            Ingresar
          </button>
        </form>
      </div>

    </div>

    <p class="mt-4 text-center text-xs text-gray-400">Portal UMAE · Uso exclusivo del personal autorizado</p>
  </div>

  <script>
    if (new URLSearchParams(window.location.search).get('error') === '1') {
      document.getElementById('error-banner').classList.remove('hidden');
    }
  </script>

</body>
</html>
